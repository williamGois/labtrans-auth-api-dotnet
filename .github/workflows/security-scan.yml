name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks-build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks working tree scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            --entrypoint sh \
            zricethezav/gitleaks:v8.24.3 \
            -c "git config --global --add safe.directory /repo && gitleaks detect --source=/repo --no-git --redact --config=/repo/.gitleaks.toml"

      - name: Run Gitleaks git history scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            --entrypoint sh \
            zricethezav/gitleaks:v8.24.3 \
            -c "git config --global --add safe.directory /repo && gitleaks detect --source=/repo --redact --config=/repo/.gitleaks.toml"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tests/AuthApi.Tests/AuthApi.Tests.csproj

      - name: Build
        run: dotnet build AuthApi.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/AuthApi.Tests/AuthApi.Tests.csproj --configuration Release --no-restore
